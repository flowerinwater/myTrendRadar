permissions:
  contents: read
name: TrendRadar Crawler
on:
  schedule:
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TrendRadar
        run: python -m trendradar

      - name: Find latest JSON
        run: |
          LATEST=$(ls -t output/*.json 2>/dev/null | head -1 || ls -t data/*.json 2>/dev/null | head -1)
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Upload to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          LATEST=$(ls -t data/*.json | head -1)
          CONTENT=$(cat "$LATEST")
          python3 -c "
          import json, os, sys
          content = os.environ['CONTENT']
          data = {'files': {'trendradar_latest.json': {'content': content}}}
          print(json.dumps(data))
          " > /tmp/gist_payload.json
          curl -X PATCH "https://api.github.com/gists/$GIST_ID" \
            -H 'Authorization: token $GIST_TOKEN' \
            -H 'Content-Type: application/json' \
            -d @/tmp/gist_payload.json
